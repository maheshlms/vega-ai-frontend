server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS resolver — resolves service names lazily at
    # request time rather than at startup, so nginx won't crash if a
    # backend container isn't up yet when the frontend starts.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── HeyGen API proxy ──────────────────────────────────────
    # Forwards /heygen-api/* → https://api.heygen.com/* server-side.
    # Bypasses CORS — the browser never talks directly to heygen.com.
    location /heygen-api/ {
        proxy_pass         https://api.heygen.com/;
        proxy_http_version 1.1;
        proxy_set_header   Host              api.heygen.com;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        proxy_read_timeout 120s;
    }

    # ── Audit service health check proxy ──────────────────────
    # Direct health probe: frontend calls /audit/health → audit-service:8002/health
    location = /audit/health {
        set $audit http://audit-service:8002;
        rewrite ^ /health break;
        proxy_pass         $audit;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # ── Audit service API proxy ───────────────────────────────
    # Must come BEFORE the generic /api/ block so nginx matches
    # the more specific path first and routes to audit-service.
    location /api/v1/audit-logs/ {
        set $audit http://audit-service:8002;
        proxy_pass         $audit;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Backend API proxy ─────────────────────────────────────
    # Forwards /api/* to the backend service on the same Docker network.
    # The browser only ever talks to port 3000 (this nginx);
    # nginx resolves "backend-service" via Docker's internal DNS.
    location /api/ {
        set $backend http://backend-service:8000;
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Audit service proxy ───────────────────────────────────
    location /audit/ {
        set $audit http://audit-service:8002;
        proxy_pass         $audit;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }


    # ── SPA routing ──────────────────────────────────────────
    # For any path that is not a real file/directory, serve
    # index.html so react-router handles it client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ─────────────────────────────────
    # Vite hashes every asset filename, so they are safe to
    # cache for a very long time.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "same-origin" always;

    # ── Compression ──────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml application/xml
               application/xml+rss text/javascript;
    gzip_min_length 1024;
}
