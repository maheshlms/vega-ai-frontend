server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Backend API proxy ─────────────────────────────────────
    # Forwards /api/* to the backend service on the same Docker network.
    # The browser only ever talks to port 3000 (this nginx);
    # nginx resolves "backend-service" via Docker's internal DNS.
    location /api/ {
        proxy_pass         http://backend-service:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Audit service proxy ───────────────────────────────────
    location /audit/ {
        proxy_pass         http://audit-service:8002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }


    # ── SPA routing ──────────────────────────────────────────
    # For any path that is not a real file/directory, serve
    # index.html so react-router handles it client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ─────────────────────────────────
    # Vite hashes every asset filename, so they are safe to
    # cache for a very long time.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "same-origin" always;

    # ── Compression ──────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml application/xml
               application/xml+rss text/javascript;
    gzip_min_length 1024;
}
