name: CICD for Frontend - Development

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

permissions:
  contents: read
  actions: read

jobs:

  gitleaks:
    name: Secret Scanning
    runs-on: [dev-runner]
    permissions:
      contents: read
      pull-requests: read
      issues: write
    steps:
      - name: Cleanup stale gitleaks temp files
        run: sudo rm -f /tmp/gitleaks.tmp /tmp/gitleaks-*.tar.gz

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Run Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  create-issue:
    needs: gitleaks
    if: ${{ always() && needs.gitleaks.result == 'failure' }}
    uses: ./.github/workflows/create-gh-issue.yaml
    permissions:
      issues: write
      contents: read
    with:
      sha: ${{ github.sha }}
      ref: ${{ github.ref }}
      actor: ${{ github.actor }}
      repository: ${{ github.repository }}
      run_id: ${{ github.run_id }}
      server_url: ${{ github.server_url }}
      issue_title: "🔐 Secrets detected in commit ${{ github.sha }}"
      issue_label: "security"
      issue_body: |
        ## 🔐 Secret Scanning Alert

        Gitleaks detected secrets in a recent commit.

        | Field | Details |
        |---|---|
        | **Branch** | `${{ github.ref }}` |
        | **Commit** | `${{ github.sha }}` |
        | **Triggered by** | @${{ github.actor }} |
        | **Workflow Run** | [View scan results](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

        ### Next Steps
        - [ ] Rotate the exposed secret immediately
        - [ ] Review the workflow run logs linked above
        - [ ] Remove the secret from git history using `git filter-repo` or BFG
        - [ ] Confirm no downstream systems were compromised

        > ⚠️ Do not close this issue until the secret has been rotated and history scrubbed.
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sonarqube:
    name: SonarQube Scan
    runs-on: [dev-runner]
    needs: gitleaks
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Setup Node.js          # required by SonarQube JS/TS plugin
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5.3.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >-
            -Dsonar.projectKey=Vega-project-Frontend
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/.git/**

      - name: Check SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  docker-build:
    name: Build Container Images
    runs-on: [dev-runner]
    needs: sonarqube
    if: ${{ needs.sonarqube.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Environment
        run: |
          sudo cp /home/vegaadmin/secrets/vega-frontend/.env ./.env
          echo "PR #${{ github.event.pull_request.number }}"
          echo "Branch: ${{ github.head_ref }}"
          echo "Commit: ${{ env.COMMIT_SHA }}"

      - name: Build
        timeout-minutes: 15
        run: |
          export COMMIT_SHA="${{ env.COMMIT_SHA }}"
          sudo -E docker compose -f docker-compose.yml build

