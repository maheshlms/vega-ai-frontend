  docker-deploy:
    name: Deploy Services
    runs-on: [dev-runner]
    needs: docker-build
    if: ${{ needs.docker-build.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup Environment
        run: sudo cp /home/vegaadmin/secrets/vega-frontend/.env ./.env

      - name: Deploy
        run: |
          export COMMIT_SHA="${{ env.COMMIT_SHA }}"
          echo "🚀 Deploying services tagged ${COMMIT_SHA}..."
          sudo -E docker compose down
          sudo -E docker compose -f docker-compose.yml up -d --remove-orphans

      - name: Verify Services
        run: sudo docker compose ps

      - name: View Ports
        run: sudo netstat -tulpn | grep LISTEN


